name: Feature Request
description: Suggest a new feature for DropSign
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or missing capability.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, references, etc.
